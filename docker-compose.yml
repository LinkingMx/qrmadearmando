version: '3.8'

services:
  # PHP-FPM Service
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmade_php
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=database
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/vendor
    networks:
      - staging_network
    depends_on:
      - postgres
      - redis

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: qrmade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-qrmade_staging}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: qrmade_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - staging_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: qrmade_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - staging_network
    depends_on:
      - php
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmade_queue
    restart: unless-stopped
    working_dir: /app
    command: php artisan queue:work redis --sleep=3 --tries=3
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/vendor
    networks:
      - staging_network
    depends_on:
      - php
      - postgres
      - redis

  # Scheduler (Cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmade_scheduler
    restart: unless-stopped
    working_dir: /app
    command: php artisan schedule:work
    environment:
      - APP_ENV=staging
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/vendor
    networks:
      - staging_network
    depends_on:
      - php
      - postgres
      - redis

networks:
  staging_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
